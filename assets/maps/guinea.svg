<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond océan -->
  <rect width="300" height="400" fill="#E0F2FE"/>
  
  <!-- Guinée - silhouette réaliste -->
  <path d="M 80 120 Q 90 100 110 95 Q 140 90 170 100 Q 190 110 200 140 Q 210 170 200 200 Q 190 220 170 230 Q 160 235 150 240 Q 140 245 130 250 Q 110 260 90 265 Q 70 260 65 240 Q 60 220 65 200 Q 70 180 75 160 Q 78 140 80 120 Z" 
        fill="#FAFAFA" stroke="#94A3B8" stroke-width="1.5"/>
  
  <!-- Régions internes (délimitants visuels) -->
  <line x1="100" y1="150" x2="180" y2="150" stroke="#E2E8F0" stroke-width="0.5"/>
  <line x1="140" y1="100" x2="120" y2="260" stroke="#E2E8F0" stroke-width="0.5"/>
  
  <!-- Annotation -->
  <text x="150" y="30" font-size="14" font-weight="bold" text-anchor="middle" fill="#0F172A">
    GUINÉE
  </text>
  <text x="150" y="380" font-size="10" text-anchor="middle" fill="#64748B">
    République de Guinée
  </text>
</svg>